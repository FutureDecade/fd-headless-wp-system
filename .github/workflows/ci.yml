name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Delivery Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Validate shell scripts
        run: |
          bash -n scripts/bootstrap-env.sh
          bash -n scripts/fetch-wordpress-assets.sh
          bash -n scripts/migrate-base-images-to-acr.sh
          bash -n scripts/preflight-check.sh
          bash -n scripts/setup-https.sh
          bash -n scripts/renew-https.sh
          bash -n scripts/update-domain-config.sh
          bash -n scripts/update-https-config.sh
          bash -n scripts/update-wordpress-release-tags.sh
          bash -n scripts/update-stack.sh
          bash -n scripts/install.sh

      - name: Validate asset mode with GH token env
        run: |
          cp .env.example .env.asset
          perl -0pi -e 's/WORDPRESS_FETCH_RELEASE_ASSETS=false/WORDPRESS_FETCH_RELEASE_ASSETS=true/' .env.asset
          ENV_FILE=.env.asset GH_TOKEN=dummy bash scripts/preflight-check.sh

      - name: Validate optional HTTPS mode
        run: |
          cp .env.example .env.https
          perl -0pi -e 's/^FRONTEND_DOMAIN=.*/FRONTEND_DOMAIN=www.example.com/m' .env.https
          perl -0pi -e 's/^ADMIN_DOMAIN=.*/ADMIN_DOMAIN=admin.example.com/m' .env.https
          perl -0pi -e 's/^WS_DOMAIN=.*/WS_DOMAIN=ws.example.com/m' .env.https
          perl -0pi -e 's/^PUBLIC_SCHEME=.*/PUBLIC_SCHEME=https/m' .env.https
          perl -0pi -e 's/^WEBSOCKET_PUBLIC_SCHEME=.*/WEBSOCKET_PUBLIC_SCHEME=wss/m' .env.https
          perl -0pi -e 's/^HTTPS_ENABLED=.*/HTTPS_ENABLED=true/m' .env.https
          mkdir -p runtime/letsencrypt/live/www.example.com
          touch runtime/letsencrypt/live/www.example.com/fullchain.pem
          touch runtime/letsencrypt/live/www.example.com/privkey.pem
          ENV_FILE=.env.https bash scripts/preflight-check.sh
          docker compose -f docker-compose.yml -f compose/https.override.yml --env-file .env.https config >/dev/null

      - name: Validate release tag updater
        run: |
          cp .env.example .env.tags
          ENV_FILE=.env.tags FD_THEME_RELEASE_TAG=v9.9.9 bash scripts/update-wordpress-release-tags.sh
          grep -q '^FD_THEME_RELEASE_TAG=v9.9.9$' .env.tags

      - name: Generate bootstrap env
        run: |
          rm -f .env
          bash scripts/bootstrap-env.sh

      - name: Validate docker compose
        run: docker compose --env-file .env config >/dev/null
