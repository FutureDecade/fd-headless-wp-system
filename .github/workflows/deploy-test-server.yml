name: Deploy Test Server

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_wordpress_asset_fetch:
        description: Force re-download WordPress release assets
        required: true
        default: "false"

concurrency:
  group: fd-headless-wp-system-test-server
  cancel-in-progress: true

jobs:
  deploy:
    name: Update Test Server
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    env:
      FORCE_WORDPRESS_ASSET_FETCH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_wordpress_asset_fetch || 'false' }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ACR_USERNAME,ACR_PASSWORD,GH_TOKEN,FORCE_WORDPRESS_ASSET_FETCH
          command_timeout: 40m
          script: |
            set -e
            cd /opt/fd-headless-wp-system
            git fetch origin main
            git reset --hard origin/main
            ACR_USERNAME="$ACR_USERNAME" \
            ACR_PASSWORD="$ACR_PASSWORD" \
            GH_TOKEN="$GH_TOKEN" \
            FORCE_WORDPRESS_ASSET_FETCH="$FORCE_WORDPRESS_ASSET_FETCH" \
            bash scripts/update-stack.sh
