name: Deploy Test Server

on:
  repository_dispatch:
    types:
      - deploy-runtime-images
  workflow_dispatch:
    inputs:
      force_wordpress_asset_fetch:
        description: Force re-download WordPress release assets
        required: true
        default: "false"
      skip_image_pull:
        description: Skip docker login and image pull, only refresh WordPress assets and recreate containers
        required: true
        default: "false"
      fd_theme_release_tag:
        description: fd-theme release tag, blank means keep current value
        required: false
      fd_admin_ui_release_tag:
        description: fd-admin-ui release tag, blank means keep current value
        required: false
      fd_member_release_tag:
        description: fd-member release tag, blank means keep current value
        required: false
      fd_payment_release_tag:
        description: fd-payment release tag, blank means keep current value
        required: false
      fd_commerce_release_tag:
        description: fd-commerce release tag, blank means keep current value
        required: false
      fd_content_types_release_tag:
        description: fd-content-types release tag, blank means keep current value
        required: false
      fd_ai_router_release_tag:
        description: fd-ai-router release tag, blank means keep current value
        required: false
      fd_websocket_push_release_tag:
        description: fd-websocket-push release tag, blank means keep current value
        required: false
      wpgraphql_jwt_auth_release_tag:
        description: wp-graphql-jwt-authentication release tag, blank means keep current value
        required: false
      wpgraphql_tax_query_ref:
        description: wp-graphql-tax-query ref, blank means keep current value
        required: false
      frontend_image:
        description: full frontend image reference, blank means keep current value
        required: false
      websocket_image:
        description: full websocket image reference, blank means keep current value
        required: false
      frontend_domain:
        description: frontend domain, blank means keep current value
        required: false
      admin_domain:
        description: admin domain, blank means keep current value
        required: false
      ws_domain:
        description: websocket domain, blank means keep current value
        required: false
      public_scheme:
        description: public scheme like http or https, blank means keep current value
        required: false
      websocket_public_scheme:
        description: websocket public scheme like ws or wss, blank means keep current value
        required: false
      letsencrypt_email:
        description: letsencrypt notification email, blank means keep current value
        required: false
      letsencrypt_staging:
        description: letsencrypt staging mode true or false, blank means keep current value
        required: false
      run_https_setup:
        description: run HTTPS certificate setup after updating config
        required: true
        default: "false"

concurrency:
  group: fd-headless-wp-system-test-server
  cancel-in-progress: true

jobs:
  deploy:
    name: Update Test Server
    runs-on: ubuntu-latest
    env:
      FORCE_WORDPRESS_ASSET_FETCH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.force_wordpress_asset_fetch || inputs.force_wordpress_asset_fetch || 'false' }}
      SKIP_IMAGE_PULL: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.skip_image_pull || inputs.skip_image_pull || 'false' }}
      FD_THEME_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_theme_release_tag || inputs.fd_theme_release_tag || '' }}
      FD_ADMIN_UI_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_admin_ui_release_tag || inputs.fd_admin_ui_release_tag || '' }}
      FD_MEMBER_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_member_release_tag || inputs.fd_member_release_tag || '' }}
      FD_PAYMENT_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_payment_release_tag || inputs.fd_payment_release_tag || '' }}
      FD_COMMERCE_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_commerce_release_tag || inputs.fd_commerce_release_tag || '' }}
      FD_CONTENT_TYPES_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_content_types_release_tag || inputs.fd_content_types_release_tag || '' }}
      FD_AI_ROUTER_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_ai_router_release_tag || inputs.fd_ai_router_release_tag || '' }}
      FD_WEBSOCKET_PUSH_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.fd_websocket_push_release_tag || inputs.fd_websocket_push_release_tag || '' }}
      WPGRAPHQL_JWT_AUTH_RELEASE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.wpgraphql_jwt_auth_release_tag || inputs.wpgraphql_jwt_auth_release_tag || '' }}
      WPGRAPHQL_TAX_QUERY_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.wpgraphql_tax_query_ref || inputs.wpgraphql_tax_query_ref || '' }}
      FRONTEND_IMAGE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.frontend_image || inputs.frontend_image || '' }}
      WEBSOCKET_IMAGE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.websocket_image || inputs.websocket_image || '' }}
      FRONTEND_DOMAIN: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.frontend_domain || inputs.frontend_domain || '' }}
      ADMIN_DOMAIN: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.admin_domain || inputs.admin_domain || '' }}
      WS_DOMAIN: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ws_domain || inputs.ws_domain || '' }}
      PUBLIC_SCHEME: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.public_scheme || inputs.public_scheme || '' }}
      WEBSOCKET_PUBLIC_SCHEME: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.websocket_public_scheme || inputs.websocket_public_scheme || '' }}
      LETSENCRYPT_EMAIL: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.letsencrypt_email || inputs.letsencrypt_email || '' }}
      LETSENCRYPT_STAGING: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.letsencrypt_staging || inputs.letsencrypt_staging || '' }}
      RUN_HTTPS_SETUP: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.run_https_setup || inputs.run_https_setup || 'false' }}
      REQUEST_SOURCE_REPO: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_repo || github.repository }}
      REQUEST_SOURCE_SHA: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_sha || github.sha }}
      REQUEST_SOURCE_RUN_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_run_id || '' }}
      REQUEST_SOURCE_WORKFLOW: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_workflow || github.workflow }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Show deploy request summary
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Source repo: ${REQUEST_SOURCE_REPO}"
          echo "Source workflow: ${REQUEST_SOURCE_WORKFLOW}"
          echo "Source sha: ${REQUEST_SOURCE_SHA}"
          echo "Source run id: ${REQUEST_SOURCE_RUN_ID:-n/a}"
          echo "Frontend image: ${FRONTEND_IMAGE:-<unchanged>}"
          echo "Websocket image: ${WEBSOCKET_IMAGE:-<unchanged>}"
          echo "Skip image pull: ${SKIP_IMAGE_PULL}"
          echo "Run HTTPS setup: ${RUN_HTTPS_SETUP}"

      - name: Validate requested release tags
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -e

          validate_release() {
            local repo="$1"
            local tag="$2"

            if [ -z "$tag" ]; then
              return 0
            fi

            echo "Checking $repo $tag"
            gh release view "$tag" -R "FutureDecade/$repo" >/dev/null
          }

          validate_release fd-theme "$FD_THEME_RELEASE_TAG"
          validate_release fd-admin-ui "$FD_ADMIN_UI_RELEASE_TAG"
          validate_release fd-member "$FD_MEMBER_RELEASE_TAG"
          validate_release fd-payment "$FD_PAYMENT_RELEASE_TAG"
          validate_release fd-commerce "$FD_COMMERCE_RELEASE_TAG"
          validate_release fd-content-types "$FD_CONTENT_TYPES_RELEASE_TAG"
          validate_release fd-ai-router "$FD_AI_ROUTER_RELEASE_TAG"
          validate_release fd-websocket-push "$FD_WEBSOCKET_PUSH_RELEASE_TAG"
          if [ -n "$WPGRAPHQL_JWT_AUTH_RELEASE_TAG" ]; then
            echo "Checking wp-graphql/wp-graphql-jwt-authentication $WPGRAPHQL_JWT_AUTH_RELEASE_TAG"
            gh release view "$WPGRAPHQL_JWT_AUTH_RELEASE_TAG" -R "wp-graphql/wp-graphql-jwt-authentication" >/dev/null
          fi
          if [ -n "$WPGRAPHQL_TAX_QUERY_REF" ]; then
            echo "Checking wp-graphql/wp-graphql-tax-query $WPGRAPHQL_TAX_QUERY_REF"
            gh release view "$WPGRAPHQL_TAX_QUERY_REF" -R "wp-graphql/wp-graphql-tax-query" >/dev/null
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ACR_USERNAME,ACR_PASSWORD,GH_TOKEN,FORCE_WORDPRESS_ASSET_FETCH,SKIP_IMAGE_PULL,FD_THEME_RELEASE_TAG,FD_ADMIN_UI_RELEASE_TAG,FD_MEMBER_RELEASE_TAG,FD_PAYMENT_RELEASE_TAG,FD_COMMERCE_RELEASE_TAG,FD_CONTENT_TYPES_RELEASE_TAG,FD_AI_ROUTER_RELEASE_TAG,FD_WEBSOCKET_PUSH_RELEASE_TAG,WPGRAPHQL_JWT_AUTH_RELEASE_TAG,WPGRAPHQL_TAX_QUERY_REF,FRONTEND_IMAGE,WEBSOCKET_IMAGE,FRONTEND_DOMAIN,ADMIN_DOMAIN,WS_DOMAIN,PUBLIC_SCHEME,WEBSOCKET_PUBLIC_SCHEME,LETSENCRYPT_EMAIL,LETSENCRYPT_STAGING,RUN_HTTPS_SETUP
          command_timeout: 40m
          script: |
            set -e
            cd /opt/fd-headless-wp-system
            git fetch origin main
            git reset --hard origin/main

            # shellcheck source=/dev/null
            source scripts/common.sh
            load_env_file .env
            FD_RUNTIME_IMAGE_UPDATE_POLICY="${FD_RUNTIME_IMAGE_UPDATE_POLICY:-manual}"

            HAS_RUNTIME_IMAGE_REQUEST=false
            if [ -n "$FRONTEND_IMAGE" ] || [ -n "$WEBSOCKET_IMAGE" ]; then
              HAS_RUNTIME_IMAGE_REQUEST=true
            fi

            HAS_NON_IMAGE_CHANGES=false
            if [ -n "$FRONTEND_DOMAIN" ] || [ -n "$ADMIN_DOMAIN" ] || [ -n "$WS_DOMAIN" ] || [ -n "$PUBLIC_SCHEME" ] || [ -n "$WEBSOCKET_PUBLIC_SCHEME" ] || [ -n "$LETSENCRYPT_EMAIL" ] || [ -n "$LETSENCRYPT_STAGING" ] || [ "$RUN_HTTPS_SETUP" = "true" ] || [ "$FORCE_WORDPRESS_ASSET_FETCH" = "true" ] || [ -n "$FD_THEME_RELEASE_TAG" ] || [ -n "$FD_ADMIN_UI_RELEASE_TAG" ] || [ -n "$FD_MEMBER_RELEASE_TAG" ] || [ -n "$FD_PAYMENT_RELEASE_TAG" ] || [ -n "$FD_COMMERCE_RELEASE_TAG" ] || [ -n "$FD_CONTENT_TYPES_RELEASE_TAG" ] || [ -n "$FD_AI_ROUTER_RELEASE_TAG" ] || [ -n "$FD_WEBSOCKET_PUSH_RELEASE_TAG" ] || [ -n "$WPGRAPHQL_JWT_AUTH_RELEASE_TAG" ] || [ -n "$WPGRAPHQL_TAX_QUERY_REF" ]; then
              HAS_NON_IMAGE_CHANGES=true
            fi

            echo "Runtime image update policy: ${FD_RUNTIME_IMAGE_UPDATE_POLICY}"

            if [ "$HAS_RUNTIME_IMAGE_REQUEST" = "true" ] && [ "${FD_RUNTIME_IMAGE_UPDATE_POLICY}" = "manual" ]; then
              ENV_FILE=.env \
              FRONTEND_IMAGE="$FRONTEND_IMAGE" \
              WEBSOCKET_IMAGE="$WEBSOCKET_IMAGE" \
              bash scripts/record-available-runtime-images.sh

              FRONTEND_IMAGE=""
              WEBSOCKET_IMAGE=""

              if [ "$HAS_NON_IMAGE_CHANGES" != "true" ]; then
                echo "Runtime image update policy is manual. Recorded available runtime images and skipped stack update."
                exit 0
              fi
            fi

            ENV_FILE=.env bash scripts/migrate-base-images-to-acr.sh

            if [ -n "$FRONTEND_DOMAIN" ] || [ -n "$ADMIN_DOMAIN" ] || [ -n "$WS_DOMAIN" ] || [ -n "$PUBLIC_SCHEME" ] || [ -n "$WEBSOCKET_PUBLIC_SCHEME" ]; then
              ENV_FILE=.env \
              FRONTEND_DOMAIN="$FRONTEND_DOMAIN" \
              ADMIN_DOMAIN="$ADMIN_DOMAIN" \
              WS_DOMAIN="$WS_DOMAIN" \
              PUBLIC_SCHEME="$PUBLIC_SCHEME" \
              WEBSOCKET_PUBLIC_SCHEME="$WEBSOCKET_PUBLIC_SCHEME" \
              bash scripts/update-domain-config.sh
            fi

            if [ -n "$LETSENCRYPT_EMAIL" ] || [ -n "$LETSENCRYPT_STAGING" ]; then
              ENV_FILE=.env \
              LETSENCRYPT_EMAIL="$LETSENCRYPT_EMAIL" \
              LETSENCRYPT_STAGING="$LETSENCRYPT_STAGING" \
              bash scripts/update-https-config.sh
            fi

            if [ -n "$FRONTEND_IMAGE" ] || [ -n "$WEBSOCKET_IMAGE" ]; then
              ENV_FILE=.env \
              FRONTEND_IMAGE="$FRONTEND_IMAGE" \
              WEBSOCKET_IMAGE="$WEBSOCKET_IMAGE" \
              bash scripts/update-runtime-images.sh
            fi

            if [ -n "$FD_THEME_RELEASE_TAG" ] || [ -n "$FD_ADMIN_UI_RELEASE_TAG" ] || [ -n "$FD_MEMBER_RELEASE_TAG" ] || [ -n "$FD_PAYMENT_RELEASE_TAG" ] || [ -n "$FD_COMMERCE_RELEASE_TAG" ] || [ -n "$FD_CONTENT_TYPES_RELEASE_TAG" ] || [ -n "$FD_AI_ROUTER_RELEASE_TAG" ] || [ -n "$FD_WEBSOCKET_PUSH_RELEASE_TAG" ] || [ -n "$WPGRAPHQL_JWT_AUTH_RELEASE_TAG" ] || [ -n "$WPGRAPHQL_TAX_QUERY_REF" ]; then
              ENV_FILE=.env \
              FD_THEME_RELEASE_TAG="$FD_THEME_RELEASE_TAG" \
              FD_ADMIN_UI_RELEASE_TAG="$FD_ADMIN_UI_RELEASE_TAG" \
              FD_MEMBER_RELEASE_TAG="$FD_MEMBER_RELEASE_TAG" \
              FD_PAYMENT_RELEASE_TAG="$FD_PAYMENT_RELEASE_TAG" \
              FD_COMMERCE_RELEASE_TAG="$FD_COMMERCE_RELEASE_TAG" \
              FD_CONTENT_TYPES_RELEASE_TAG="$FD_CONTENT_TYPES_RELEASE_TAG" \
              FD_AI_ROUTER_RELEASE_TAG="$FD_AI_ROUTER_RELEASE_TAG" \
              FD_WEBSOCKET_PUSH_RELEASE_TAG="$FD_WEBSOCKET_PUSH_RELEASE_TAG" \
              WPGRAPHQL_JWT_AUTH_RELEASE_TAG="$WPGRAPHQL_JWT_AUTH_RELEASE_TAG" \
              WPGRAPHQL_TAX_QUERY_REF="$WPGRAPHQL_TAX_QUERY_REF" \
              bash scripts/update-wordpress-release-tags.sh
              FORCE_WORDPRESS_ASSET_FETCH=true
            fi

            if [ "$RUN_HTTPS_SETUP" = "true" ]; then
              ACR_USERNAME="$ACR_USERNAME" \
              ACR_PASSWORD="$ACR_PASSWORD" \
              GH_TOKEN="$GH_TOKEN" \
              GITHUB_TOKEN="$GH_TOKEN" \
              bash scripts/setup-https.sh
            else
              ACR_USERNAME="$ACR_USERNAME" \
              ACR_PASSWORD="$ACR_PASSWORD" \
              GH_TOKEN="$GH_TOKEN" \
              FORCE_WORDPRESS_ASSET_FETCH="$FORCE_WORDPRESS_ASSET_FETCH" \
              SKIP_IMAGE_PULL="$SKIP_IMAGE_PULL" \
              bash scripts/update-stack.sh
            fi
