services:
  db:
    image: ${MARIADB_IMAGE}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - core

  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    networks:
      - core

  wordpress:
    image: ${WORDPRESS_IMAGE}
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${PUBLIC_SCHEME}://${ADMIN_DOMAIN}');
        define('WP_SITEURL', '${PUBLIC_SCHEME}://${ADMIN_DOMAIN}');
        define('FD_FRONTEND_URL', '${PUBLIC_SCHEME}://${FRONTEND_DOMAIN}');
        define('WP_REDIS_HOST', 'redis');
    volumes:
      - wordpress_data:/var/www/html
      - ./apache/allow-override.conf:/etc/apache2/conf-enabled/fd-allow-override.conf:ro
    networks:
      - core
      - edge

  wpcli:
    image: ${WPCLI_IMAGE:-wordpress:cli-2.12.0}
    profiles:
      - tools
    depends_on:
      - db
      - wordpress
    user: "33:33"
    working_dir: /var/www/html
    environment:
      HOME: /tmp
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${PUBLIC_SCHEME}://${ADMIN_DOMAIN}');
        define('WP_SITEURL', '${PUBLIC_SCHEME}://${ADMIN_DOMAIN}');
        define('FD_FRONTEND_URL', '${PUBLIC_SCHEME}://${FRONTEND_DOMAIN}');
        define('WP_REDIS_HOST', 'redis');
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - core
      - edge

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - wordpress
      - websocket
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_WORDPRESS_API_URL: ${PUBLIC_SCHEME}://${ADMIN_DOMAIN}/graphql
      NEXT_PUBLIC_WORDPRESS_URL: ${PUBLIC_SCHEME}://${ADMIN_DOMAIN}
      WP_BASE_URL: ${PUBLIC_SCHEME}://${ADMIN_DOMAIN}
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_SCHEME}://${FRONTEND_DOMAIN}
      NEXT_PUBLIC_WEBSOCKET_URL: ${WEBSOCKET_PUBLIC_SCHEME}://${WS_DOMAIN}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      SENTRY_ORG: ${SENTRY_ORG}
      SENTRY_PROJECT: ${SENTRY_PROJECT}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
    networks:
      - edge

  websocket:
    image: ${WEBSOCKET_IMAGE}
    restart: unless-stopped
    environment:
      PORT: 8080
      PUSH_SECRET: ${PUSH_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${PUBLIC_SCHEME}://${FRONTEND_DOMAIN},${PUBLIC_SCHEME}://${ADMIN_DOMAIN}
    networks:
      - edge

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    depends_on:
      - frontend
      - wordpress
      - websocket
    ports:
      - "${HTTP_PORT}:80"
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      WS_DOMAIN: ${WS_DOMAIN}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$FRONTEND_DOMAIN $$ADMIN_DOMAIN $$WS_DOMAIN' \
          < /etc/nginx/templates/default.conf.template \
          > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    networks:
      - edge

volumes:
  db_data:
  wordpress_data:

networks:
  core:
  edge:
